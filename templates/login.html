<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — SDEL Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #F5A623;
      --orange-dark: #D4880A;
      --noir: #1A1A1A;
      --gris-moyen: #4A4A4A;
      --gris-clair: #E8E8E8;
      --rouge: #D32F2F;
      --police-titre: 'IBM Plex Sans', sans-serif;
      --police-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fond industriel : grille de points subtile */
    body {
      font-family: var(--police-titre);
      background: var(--noir);
      background-image: radial-gradient(circle, #333 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Boîte de connexion */
    .login-box {
      background: #FAFAFA;
      width: 100%;
      max-width: 400px;
      border-top: 4px solid var(--orange);
      padding: 2.5rem 2rem 2rem;
    }

    /* En-tête */
    .login-header {
      margin-bottom: 2rem;
      text-align: center;
    }
    .login-badge {
      display: inline-block;
      background: var(--orange);
      color: var(--noir);
      font-family: var(--police-mono);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 4px 12px;
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--noir);
    }
    .login-subtitle {
      color: var(--gris-moyen);
      font-size: 0.8rem;
      font-family: var(--police-mono);
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* Messages d'erreur */
    .flash-error {
      background: #FFEBEE;
      border-left: 3px solid var(--rouge);
      color: #B71C1C;
      padding: 9px 12px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      border-radius: 2px;
    }

    /* Champs du formulaire */
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.75rem;
      font-family: var(--police-mono);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gris-moyen);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid var(--gris-clair);
      border-radius: 3px;
      font-family: var(--police-titre);
      font-size: 0.9rem;
      background: white;
      color: var(--noir);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--orange); }

    /* Bouton connexion */
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--orange);
      color: var(--noir);
      border: none;
      font-family: var(--police-titre);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { background: var(--orange-dark); }

    /* Lien page publique */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--gris-moyen);
      font-family: var(--police-mono);
    }
    .login-footer a {
      color: var(--orange-dark);
      text-decoration: none;
      font-weight: 600;
    }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-header">
      <div class="login-badge">SDEL</div>
      <div class="login-title">Inventory</div>
      <div class="login-subtitle">Gestion des Stocks — Vinci Energies</div>
    </div>

    <!-- Affichage des messages flash (ex: "Identifiants incorrects") -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-error">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Formulaire de connexion -->
    <form method="POST" action="{{ url_for('main.login') }}">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" placeholder="Votre identifiant" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login">Se connecter →</button>
    </form>

    <!-- Lien vers la page publique (sans connexion) -->
    <div class="login-footer">
      Accès public →
      <a href="{{ url_for('main.inventaire_public') }}">Voir l'inventaire sans connexion</a>
    </div>
  </div>

</body>
</html>
